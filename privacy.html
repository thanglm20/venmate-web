<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - Venmate</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #09CCD3; --bg: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.7; color: var(--text); background: #f4f7f8; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: var(--bg); padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        /* Định dạng nội dung từ Markdown đổ vào */
        #content h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 30px; }
        #content h3 { color: var(--primary); margin-top: 25px; border-left: 4px solid var(--primary); padding-left: 15px; }
        #content p, #content li { font-size: 1.05rem; margin-bottom: 10px; }
        #content strong { color: #000; }
        
        .footer-nav { margin-top: 40px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        .footer-nav a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="content">Đang tải nội dung chính sách...</div>
</div>

<script>
    // Hàm tự động lấy nội dung từ file content.md
    async function loadPrivacy() {
        try {
            const response = await fetch('privacy_content.md');
            if (!response.ok) throw new Error('Không tìm thấy file nội dung');
            const data = await response.text();
            document.getElementById('content').innerHTML = marked.parse(data);
        } catch (err) {
            document.getElementById('content').innerHTML = "Lỗi: Không thể tải nội dung. Vui lòng kiểm tra lại file content.md trên GitHub.";
        }
    }
    loadPrivacy();
</script>

</body>
</html>
