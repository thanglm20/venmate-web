<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service - Venmate</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #09CCD3; --bg: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.7; color: var(--text); background: #f4f7f8; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: var(--bg); padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        #content h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 30px; }
        #content h3 { color: var(--primary); margin-top: 25px; border-left: 4px solid var(--primary); padding-left: 15px; }
        .footer-nav { margin-top: 40px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        .footer-nav a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="content">Đang tải điều khoản...</div>
    <div class="footer-nav"><a href="index.html">← Quay lại Trang chủ</a></div>
</div>
<script>
    async function loadTerms() {
        try {
            const response = await fetch('terms_content.md');
            const data = await response.text();
            document.getElementById('content').innerHTML = marked.parse(data);
        } catch (err) { document.getElementById('content').innerHTML = "Lỗi tải nội dung."; }
    }
    loadTerms();
</script>
</body>
</html>
